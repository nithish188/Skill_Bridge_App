name: Android Build (Buildozer)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix permissions for Docker volume
        run: chmod -R 777 .

      - name: Build APK with official Kivy Docker image
        run: |
          docker run --rm \
            --volume "$(pwd):/home/user/hostcwd" \
            kivy/buildozer:latest \
            android debug

      - name: List output
        run: |
          echo "=== bin/ directory ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ directory"
          echo "=== All APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SkillBridge-Android-APK
          path: bin/*.apk
          if-no-files-found: warn
